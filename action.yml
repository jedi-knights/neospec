name: neospec
description: Run Lua tests and collect coverage for Neovim plugins and distributions.
author: Jedi Knights

branding:
  icon: check-circle
  color: green

inputs:
  neovim-version:
    description: Neovim version to use (stable, nightly, or semver like 0.10.4)
    required: false
    default: stable
  test-patterns:
    description: Comma-separated glob patterns for test file discovery
    required: false
    default: "test/**/*_spec.lua"
  coverage-dir:
    description: Directory for coverage report files
    required: false
    default: coverage
  formats:
    description: Comma-separated list of output formats (console, lcov, cobertura, coveralls, junit)
    required: false
    default: console
  badge-patch:
    description: Patch the coverage badge in README.md
    required: false
    default: "false"
  readme-path:
    description: Path to README.md for badge patching
    required: false
    default: README.md
  threshold:
    description: Minimum required coverage percentage (fails if below)
    required: false
    default: "0"
  verbose:
    description: Enable verbose output
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Download neospec
      shell: bash
      run: |
        set -euo pipefail

        OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
        ARCH="$(uname -m)"
        case "$ARCH" in
          x86_64)          ARCH="amd64" ;;
          aarch64 | arm64) ARCH="arm64" ;;
          *) echo "Unsupported architecture: $ARCH" >&2; exit 1 ;;
        esac

        # Resolve the version to install:
        #   1. Use the action's own ref when it is a full semver tag (v1.2.3).
        #   2. Otherwise fall back to the latest release from the GitHub API.
        VERSION="${GITHUB_ACTION_REF:-}"
        if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          VERSION="$(curl -fsSL https://api.github.com/repos/jedi-knights/neospec/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4)"
        fi

        if [ -z "$VERSION" ]; then
          echo "::error::Failed to resolve neospec version" >&2
          exit 1
        fi

        # GoReleaser archive format: neospec_<version-without-v>_<os>_<arch>.tar.gz
        VER="${VERSION#v}"
        ARCHIVE="neospec_${VER}_${OS}_${ARCH}.tar.gz"
        URL="https://github.com/jedi-knights/neospec/releases/download/${VERSION}/${ARCHIVE}"

        echo "Downloading neospec ${VERSION} (${OS}/${ARCH})"
        curl -fsSL "$URL" | tar -xz -C "$RUNNER_TEMP" neospec
        echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

    - name: Run neospec
      shell: bash
      env:
        NEOSPEC_NEOVIM_VERSION: ${{ inputs.neovim-version }}
        NEOSPEC_TEST_PATTERNS: ${{ inputs.test-patterns }}
        NEOSPEC_COVERAGE_DIR: ${{ inputs.coverage-dir }}
        NEOSPEC_FORMATS: ${{ inputs.formats }}
        NEOSPEC_BADGE_PATCH: ${{ inputs.badge-patch }}
        NEOSPEC_README_PATH: ${{ inputs.readme-path }}
        NEOSPEC_VERBOSE: ${{ inputs.verbose }}
      run: |
        THRESHOLD_FLAG=""
        if [ "${{ inputs.threshold }}" != "0" ]; then
          THRESHOLD_FLAG="--threshold=${{ inputs.threshold }}"
        fi
        neospec run $THRESHOLD_FLAG
