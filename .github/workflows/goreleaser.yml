name: GoReleaser

# Triggered by the v* tag that go-semantic-release pushes during the
# release workflow. GoReleaser reads the version from the tag, cross-compiles
# for all supported platforms, packages the archives, and creates the GitHub
# release with all assets attached.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # GoReleaser needs full history to generate a correct changelog.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
