name: Release

# Runs on every push to main. go-semantic-release analyzes conventional
# commits since the last tag to determine whether a release is warranted,
# and if so, computes the next semantic version, writes CHANGELOG.md and
# VERSION, creates the git tag, and pushes back to main with [skip ci].
# The resulting v* tag then triggers goreleaser.yml for binary distribution.

on:
  push:
    branches: [main]
    paths-ignore:
      - "CHANGELOG.md"
      - "VERSION"
      - "README.md"

permissions:
  contents: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required for commit analysis across all tags.
          fetch-depth: 0

      - uses: jedi-knights/go-semantic-release@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
